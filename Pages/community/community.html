<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le jeu du Vendredi</title>
<link rel="stylesheet" href="/style.css" />
</head>

<body>
  <div class="page">
    <header class="site-header">
      <div class="logo-container">
        <img src="/Medias/logo.avif" alt="Stratow logo"/>
      </div>
      <nav>
        <a href="../index.html">Accueil</a>
        <a href="../create.html">Créer</a>
        <a href="../prequiz.html">Jouer</a>

    <main class="community-page">

          <ul class="leaderboard-list" id="leaderboardList"></ul>

          <section class="community-filters">
