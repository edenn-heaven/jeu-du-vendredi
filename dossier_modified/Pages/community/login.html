<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Le jeu du Vendredi</title>
    <link rel="stylesheet" href="/style.css" />
</head>

<body>
    <div class="page">
        <header class="site-header">
            <div class="logo-container">
                <img src="/Medias/logo.avif" alt="Stratow logo"/>
            </div>
            <nav>
                <a href="../index.html">Accueil</a>
                <a href="../create.html">Créer</a>
                <a href="../prequiz.html">Jouer</a>
                <a href="../community/community.html">Communauté</a>
                <a href="../community/login.html">Compte</a>
            </nav>
        </header>
        <main>
            <h1>Connexion</h1>
            <p>Veuillez entrez les informations pour vous connecter à votre compte. Si vous n'avez pas encore de compte, vous pouvez écrire un username et un mot de passe qui n'existent pas encore. Votre compte sera créé automatiquement.</p>
            <form action="/login" method="POST">
                <label for="username">Nom d'utilisateur :</label>
                <input type="text" id="username" name="username" placeholder="Nom d'utilisateur" required />
                <label for="password">Mot de passe :</label>
                <input type="password" id="password" name="password" placeholder="Mot de passe" required />
                <button class="buzzer" type="submit">Se connecter</button>
            </form>
            <button class="buzzer buzzer--ghost logout-btn" id="logout-btn" type="button">Se déconnecter</button>
    </div>
</body>
<script src="/Javascript/storage.js"></script>
<script src="/Javascript/community/login.js"></script>

</html>
